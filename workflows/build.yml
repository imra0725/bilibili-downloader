name: Build Windows EXE

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pywebview requests

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "B站视频下载器" `
            --add-data "dist;dist" `
            --add-data "backend;backend" `
            --hidden-import backend.bilibili_api `
            --hidden-import backend.download_manager `
            --hidden-import backend.database `
            --hidden-import backend.api `
            --hidden-import backend `
            --hidden-import requests `
            --hidden-import urllib3 `
            --hidden-import certifi `
            --hidden-import charset_normalizer `
            --hidden-import idna `
            --collect-all requests `
            backend\main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: B站视频下载器-Windows
          path: dist/B站视频下载器.exe

      - name: Create Release
        if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/B站视频下载器.exe
          generate_release_notes: true
